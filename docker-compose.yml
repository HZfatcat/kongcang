services:
  postgres:
    image: postgres:16-alpine
    container_name: kefu-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kefumonitor}
      POSTGRES_USER: ${POSTGRES_USER:-kefu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kefu_pass}
      TZ: Asia/Shanghai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kefu-redis
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kefu-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://kefu:kefu_pass@postgres:5432/kefumonitor?schema=public&timezone=Asia/Shanghai
      REDIS_URL: redis://redis:6379
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
      TZ: Asia/Shanghai
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_WECOM_APPID: ${VITE_WECOM_APPID}
        VITE_WECOM_AGENTID: ${VITE_WECOM_AGENTID}
        VITE_WECOM_CSDN_APPID: ${VITE_WECOM_CSDN_APPID}
        VITE_WECOM_CSDN_AGENTID: ${VITE_WECOM_CSDN_AGENTID}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
        VITE_DISABLE_AUTH: ${VITE_DISABLE_AUTH:-true}
    container_name: kefu-web
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  postgres_data:
