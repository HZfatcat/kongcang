# 生产环境 Docker Compose 配置
# 使用方式: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: kefu-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kefumonitor}
      POSTGRES_USER: ${POSTGRES_USER:-kefu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kefu_pass}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/libpostgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kefu} -d ${POSTGRES_DB:-kefumonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kefu-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kefu-api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kefu}:${POSTGRES_PASSWORD:-kefu_pass}@postgres:5432/${POSTGRES_DB:-kefumonitor}?schema=public&timezone=Asia/Shanghai
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_WECOM_APPID: ${VITE_WECOM_APPID}
        VITE_WECOM_AGENTID: ${VITE_WECOM_AGENTID}
        VITE_WECOM_CSDN_APPID: ${VITE_WECOM_CSDN_APPID}
        VITE_WECOM_CSDN_AGENTID: ${VITE_WECOM_CSDN_AGENTID}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_DISABLE_AUTH: ${VITE_DISABLE_AUTH:-false}
    container_name: kefu-web
    restart: always
    environment:
      TZ: Asia/Shanghai
    ports:
      - '8080:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
